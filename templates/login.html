{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center my-5">
    <div class="col-md-6 col-lg-5">
        <div class="main-card shadow-sm p-4 bg-white rounded-4">
            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center justify-content-center bg-light text-primary rounded-circle mb-3" style="width: 60px; height: 60px; font-size: 1.8rem;">
                    <i class="bi bi-shield-lock-fill"></i>
                </div>
                <h3 class="fw-bold text-secondary">Autentificare</h3>
                <p class="text-muted">Introdu datele de cont pentru a accesa platforma</p>
            </div>

            <form action="{{ url_for('login') }}" method="POST">
                <div class="mb-3">
                    <label for="email" class="form-label text-secondary fw-semibold">Adresă de e-mail</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0" style="border-radius: 8px 0 0 8px;"><i class="bi bi-envelope"></i></span>
                        <input type="email" name="email" id="email" class="form-control form-control-custom border-start-0" style="border-radius: 0 8px 8px 0;" placeholder="Email" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label text-secondary fw-semibold">Parolă</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0" style="border-radius: 8px 0 0 8px;"><i class="bi bi-key"></i></span>
                        <input type="password" name="password" id="password" class="form-control form-control-custom border-start-0" style="border-radius: 0 8px 8px 0;" placeholder="Parola ta" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary-custom w-100 py-2 fs-6 shadow-sm"><i class="bi bi-box-arrow-in-right"></i> Intră în cont</button>
            </form>

            <hr class="my-4 text-muted">

            <div class="text-center">
                <span class="text-muted">Nu ai cont încă?</span>
                <a href="{{ url_for('register') }}" class="fw-bold text-primary text-decoration-none ms-1">Înregistrează-te</a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
